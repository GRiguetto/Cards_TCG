<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Cards</title>
</head>
<body>
    
    <div class="card">

        <div class = "card-header">
            <h2 class="card-title">Mago sombra</h2>
            <div class="card-hp">25 <span class = "hp-icon">♥</span></div>
        </div>

        <div class="card-image-cotainers">
            <img src="" alt="Mago Sombra" class="card-image">
        </div>

        <div class="card-stats">
            <span class="stat-icon">🛡️</span>
            <span class="stat-icon">💨</span>
            <span class="stat-icon">💥</span>
        </div>

        <div class="card-abilities" >
            <div class = "ability">
                <span class="ability-dot">●</span>
                <div class ="ability-box">
                    <p>Emboscador Terrível</p>
                </div>
            </div>

            <div class = "ability">
                <span class="ability-dot">●</span>
                <div class ="ability-box">
                    <p>Ataque Sombrio</p>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
